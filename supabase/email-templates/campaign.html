<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Fãs por Natureza</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#f9f8f7;font-family:Barlow,Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f9f8f7;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:600px;background-color:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
          <tr>
            <td align="center" style="background-color:#0d6632;padding:28px 24px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center" style="padding-bottom:16px;">
                    <img
                      src="{{ .SiteURL }}/images/dashboard/logo-fgb.png"
                      alt="Fundação Grupo Boticário"
                      width="160"
                      height="58"
                      style="display:block;border:0;outline:none;text-decoration:none;height:auto;max-width:160px;"
                    />
                  </td>
                </tr>
                <tr>
                  <td align="center">
                    <img
                      src="{{ .SiteURL }}/images/dashboard/logo-branco.png"
                      alt="Fãs por Natureza"
                      width="140"
                      height="68"
                      style="display:block;border:0;outline:none;text-decoration:none;height:auto;max-width:140px;"
                    />
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:40px 32px 24px;">
              <div style="font-size:16px;line-height:1.65;color:#4a4a4a;">
                {{ .Content }}
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:0 32px 32px;">
              <p style="margin:0;font-size:13px;line-height:1.5;color:#9ca3af;">
                Você recebeu este e-mail porque participa do Fãs por Natureza.
                <a href="{{ .PreferencesURL }}" style="color:#0d6632;text-decoration:underline;">Gerenciar preferências de notificação</a>
              </p>
            </td>
          </tr>

          <tr>
            <td style="background-color:#f9f8f7;padding:20px 32px;border-top:1px solid #e8e6e4;">
              <p style="margin:0;font-size:12px;line-height:1.5;color:#0d6632;text-align:center;font-weight:500;">
                © 2026 Fundação Grupo Boticário · Fãs por Natureza
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
